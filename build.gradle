 */

plugins {
  // Mixed Java + Scala + Kotlin project
  id 'scala'
  id 'application'
  id 'org.jetbrains.kotlin.jvm' version '2.3.10'
}

application {
  /*
   EXAMPLE for non-default main class:
        ./gradlew -PmainClass=cub.testapp.ScalaTestApp run
   */
  mainClass = project.hasProperty('mainClass')
    ? project.getProperty('mainClass')
    : 'cub.testapp.JavaTestApp'
}

dependencies {
  implementation('com.squareup.okhttp3:okhttp:4.9.2')
  implementation("com.google.code.gson:gson:2.13.2")

  implementation('org.scala-lang:scala-library:2.13.11')
  testImplementation('org.scalatest:scalatest_2.13:3.2.14')
  testImplementation('org.scalatest:scalatest-flatspec_2.13:3.2.14')

  implementation('org.jetbrains.kotlin:kotlin-stdlib-jdk8')

  testImplementation('org.junit.jupiter:junit-jupiter-api:5.13.4')
  testImplementation('org.junit.jupiter:junit-jupiter-engine:5.13.4')
  testImplementation('org.junit.jupiter:junit-jupiter-params:5.13.4')
  testImplementation('org.hamcrest:hamcrest:3.0')

  testImplementation('co.helmethair:scalatest-junit-runner:0.2.0')

  testRuntimeOnly('org.junit.platform:junit-platform-launcher:1.10.3')
}

tasks.withType(JavaCompile).configureEach {
  options.release = 17
}

tasks.withType(ScalaCompile).configureEach {
  options.release = 17
}

tasks.withType(GroovyCompile).configureEach {
  options.forkOptions.jvmArgs << '-Dspock.iKnowWhatImDoing.disableGroovyVersionCheck=true'
}

repositories {
  mavenCentral()
}

test {
  useJUnitPlatform()
}
