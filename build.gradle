plugins {
  // Mixed Java11 + Scala2 + Kotlin project
  id 'scala'
  id 'application'
  id 'org.jetbrains.kotlin.jvm'
}

application {
  /*
   EXAMPLE for non-default main class:
        ./gradlew -PmainClass=cub.testapp.ScalaTestApp run
   */
  mainClass = project.hasProperty('mainClass') ? project.getProperty('mainClass') : 'cub.testapp.JavaTestApp'
}

dependencies {
  implementation('org.scala-lang:scala-library:2.13.10')
  testImplementation('org.scalatest:scalatest_2.13:3.2.14')
  testImplementation('org.scalatest:scalatest-flatspec_2.13:3.2.14')

  implementation('org.jetbrains.kotlin:kotlin-stdlib-jdk8')

  testImplementation('org.junit.jupiter:junit-jupiter-api:5.9.1')
  testImplementation('org.junit.jupiter:junit-jupiter-engine:5.9.1')
  testImplementation('org.junit.jupiter:junit-jupiter-params:5.9.1')
  testImplementation('org.hamcrest:hamcrest:2.2')

  testImplementation('co.helmethair:scalatest-junit-runner:0.2.0')
}

tasks.withType(JavaCompile) {
  sourceCompatibility = '17'
  targetCompatibility = '17'
}

tasks.withType(ScalaCompile) {
  targetCompatibility = '17'
}

tasks.withType(GroovyCompile).configureEach {
  options.forkOptions.jvmArgs << '-Dspock.iKnowWhatImDoing.disableGroovyVersionCheck=true'
}

repositories {
  mavenCentral()
}

test {
  useJUnitPlatform()
//  useJUnitPlatform() {
//    includeEngines 'scalatest'
//  }
}

compileKotlin {
  kotlinOptions {
    jvmTarget = "17"
  }
}

compileTestKotlin {
  kotlinOptions {
    jvmTarget = "17"
  }
}
