plugins {
  // Mixed Java17 + Scala2 + Groovy4 project
  id 'scala'
  id 'groovy'
  id 'application'
}

application {
  /*
   EXAMPLE for non-default main class:
        ./gradlew -PmainClass=org.cubuanic.coding.groovy.TestApp run
        ./gradlew -PmainClass=org.cubuanic.coding.scala.TestApp run
   */
  mainClass = project.hasProperty('mainClass') ? project.getProperty('mainClass') : 'org.cubuanic.coding.TestApp'
}

dependencies {
  implementation('org.scala-lang:scala-library:2.13.8')
  testImplementation('org.scalatest:scalatest_2.13:3.2.11')
  testImplementation('org.scalatest:scalatest-flatspec_2.13:3.2.11')


  implementation('org.apache.groovy:groovy:4.0.0')
  testImplementation('org.spockframework:spock-core:2.0-groovy-3.0') {
    exclude group: 'org.codehaus.groovy'
  }

  testImplementation('org.junit.jupiter:junit-jupiter-api:5.8.2')
  testImplementation('org.junit.jupiter:junit-jupiter-engine:5.8.2')
  testImplementation('org.junit.jupiter:junit-jupiter-params:5.8.2')
  testImplementation('co.helmethair:scalatest-junit-runner:0.1.10')
}

tasks.withType(JavaCompile) {
  sourceCompatibility = '17'
  targetCompatibility = '17'
}

tasks.withType(ScalaCompile) {
  targetCompatibility = '11'
}

tasks.withType(GroovyCompile).configureEach {
  options.forkOptions.jvmArgs << '-Dspock.iKnowWhatImDoing.disableGroovyVersionCheck=true'
}

repositories {
  mavenCentral()
}

test {
  useJUnitPlatform()
//  useJUnitPlatform() {
//    includeEngines 'scalatest'
//  }
}
